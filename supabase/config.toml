project_id = "agon"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000",
  "http://localhost:5173",
  "https://*.vercel.app"
]

[edge_runtime]
enabled = true
policy = "per_worker"

[functions.strava-oauth-start]
verify_jwt = true

[functions.strava-oauth-callback]
verify_jwt = false

[functions.strava-sync]
verify_jwt = true

[functions.weather-enrich]
verify_jwt = true

[functions.predict-race]
verify_jwt = true

[functions.data-export]
verify_jwt = true

[functions.delete-account]
verify_jwt = true
