<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!-- Lock viewport : pas de zoom utilisateur (pinch + double-tap),
         pas de zoom auto sur les inputs iOS (focus / Face ID / autofill).
         `user-scalable=no` + `maximum-scale=1.0` désactivent les deux. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="AGON — Endurance & trail analytics. Check-in quotidien + Live tracking GPS." />
    <meta name="theme-color" content="#A0432E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AGON" />
    <link rel="icon" type="image/png" href="/agon-icon.png" />
    <link rel="apple-touch-icon" href="/agon-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>AGON</title>
    <!-- Anti-FOUC : applique data-theme AVANT le premier paint pour éviter
         un flash sombre→clair au chargement. Doit rester synchrone et
         utiliser la même clé que next-themes (storageKey="agon-theme").
         Défaut AGON = sombre ; "system" suit prefers-color-scheme. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('agon-theme');
          var resolved =
            stored === 'light' || stored === 'dark'
              ? stored
              : stored === 'system'
                ? window.matchMedia('(prefers-color-scheme: light)').matches
                  ? 'light'
                  : 'dark'
                : 'dark';
          document.documentElement.setAttribute('data-theme', resolved);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta)
            meta.setAttribute('content', resolved === 'light' ? '#F5EFE0' : '#191815');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
